name: Build Cloud Diagram PPTX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-pptx Pillow requests

      # --- Download latest AWS Architecture icon PNGs ---
      - name: Verify icons (using repo upload)
        run: |
          echo "Icons included in repository:"
          ls -1 aws_icons_2023

      # --- Run the PowerPoint builder ---
      - name: Run PowerPoint builder
        run: |
          echo "--- Verify Python ---"
          python --version
          echo "--- Installed packages ---"
          pip list
          echo "--- Icon folder contents ---"
          ls -l aws_icons_2023 || echo "⚠ aws_icons_2023 missing"
          echo "--- Run script ---"
          python create_cloud_architecture_pptx.py

      # --- Upload result if script succeeded ---
      - name: Upload PPTX artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Cloud_Example_Diagram
          path: Cloud_Example_Diagram.pptx
